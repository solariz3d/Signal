<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Signal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: 'Consolas', monospace;
    }
    canvas {
      position: absolute;
      top: 0; left: 0;
      display: block;
    }
    #signal-text {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(1.0);
      color: rgba(245, 248, 255, 0);
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 52px;
      font-weight: 300;
      letter-spacing: 18px;
      text-transform: uppercase;
      z-index: 10;
      text-shadow: 0 0 20px rgba(140, 180, 255, 0.4), 0 0 40px rgba(80, 120, 220, 0.2);
      transition: color 0.5s ease-out, text-shadow 0.5s ease-out;
      pointer-events: none;
      padding-left: 18px;
    }
    #signal-text.visible {
      color: rgba(245, 248, 255, 0.95);
    }
    #signal-text.passing {
      transform: translate(-50%, -50%) scale(1.8);
      color: rgba(245, 248, 255, 0);
      transition: transform 1.0s cubic-bezier(0.4, 0, 0.9, 1), color 0.8s ease-in;
    }
  </style>
</head>
<body>
  <div id="signal-text">SIGNAL</div>
  <script src="splash.js"></script>
</body>
</html>
